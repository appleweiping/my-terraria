<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="800" height="80">
  <defs>
    <linearGradient id="lava-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="70%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#ff4500"/>
    </linearGradient>
  </defs>
  <!-- Dark stone background -->
  <rect width="800" height="80" fill="#2a2a2a"/>
  <!-- Stone texture -->
  <rect x="0" y="0" width="800" height="50" fill="#3a3a3a"/>
  <rect x="20" y="8" width="8" height="6" fill="#4a4a4a"/>
  <rect x="80" y="15" width="10" height="4" fill="#505050"/>
  <rect x="150" y="5" width="6" height="8" fill="#4a4a4a"/>
  <rect x="220" y="20" width="8" height="4" fill="#505050"/>
  <rect x="350" y="10" width="10" height="6" fill="#4a4a4a"/>
  <rect x="450" y="18" width="6" height="4" fill="#505050"/>
  <rect x="550" y="6" width="8" height="6" fill="#4a4a4a"/>
  <rect x="650" y="22" width="10" height="4" fill="#505050"/>
  <rect x="720" y="12" width="8" height="6" fill="#4a4a4a"/>
  <!-- Gems -->
  <!-- Amethyst (purple) -->
  <rect x="60" y="25" width="4" height="8" fill="#9b59b6"/>
  <rect x="56" y="29" width="4" height="4" fill="#8e44ad"/>
  <rect x="64" y="29" width="4" height="4" fill="#8e44ad"/>
  <!-- Sapphire (blue) -->
  <rect x="180" y="20" width="4" height="8" fill="#3498db"/>
  <rect x="176" y="24" width="4" height="4" fill="#2980b9"/>
  <rect x="184" y="24" width="4" height="4" fill="#2980b9"/>
  <!-- Ruby (red) -->
  <rect x="320" y="28" width="4" height="8" fill="#e74c3c"/>
  <rect x="316" y="32" width="4" height="4" fill="#c0392b"/>
  <rect x="324" y="32" width="4" height="4" fill="#c0392b"/>
  <!-- Emerald (green) -->
  <rect x="480" y="22" width="4" height="8" fill="#2ecc71"/>
  <rect x="476" y="26" width="4" height="4" fill="#27ae60"/>
  <rect x="484" y="26" width="4" height="4" fill="#27ae60"/>
  <!-- Topaz (yellow) -->
  <rect x="600" y="30" width="4" height="8" fill="#f1c40f"/>
  <rect x="596" y="34" width="4" height="4" fill="#d4ac0d"/>
  <rect x="604" y="34" width="4" height="4" fill="#d4ac0d"/>
  <!-- Diamond (white) -->
  <rect x="720" y="18" width="4" height="8" fill="#ecf0f1"/>
  <rect x="716" y="22" width="4" height="4" fill="#bdc3c7"/>
  <rect x="724" y="22" width="4" height="4" fill="#bdc3c7"/>
  <!-- Lava at bottom -->
  <rect x="0" y="60" width="800" height="20" fill="#ff4500"/>
  <rect x="0" y="56" width="800" height="6" fill="#ff6600" opacity="0.7"/>
  <!-- Lava bubbles -->
  <rect x="100" y="62" width="6" height="6" fill="#ff8c00"/>
  <rect x="250" y="66" width="8" height="6" fill="#ffcc00" opacity="0.6"/>
  <rect x="400" y="63" width="6" height="5" fill="#ff8c00"/>
  <rect x="550" y="67" width="8" height="5" fill="#ffcc00" opacity="0.6"/>
  <rect x="700" y="62" width="6" height="6" fill="#ff8c00"/>
  <!-- Lava glow on stone -->
  <rect x="0" y="50" width="800" height="6" fill="#ff4500" opacity="0.2"/>
  <!-- Text -->
  <text x="400" y="46" text-anchor="middle" style="font-family:monospace;font-size:12px;fill:#aaaaaa;letter-spacing:2px;">Dig deeper. Build higher. Archive everything.</text>
</svg>